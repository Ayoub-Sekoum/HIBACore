# ────────────────────────────────────────────────────────────────
# HIBACore — Deploy to Azure (Manual Trigger)
# ────────────────────────────────────────────────────────────────
# Press "Run workflow" on GitHub Actions to deploy.
#
# Required GitHub Secret:
#   AZURE_CREDENTIALS – JSON from `az ad sp create-for-rbac --sdk-auth`
# ────────────────────────────────────────────────────────────────

name: "\U0001F680 Deploy to Azure"

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  RESOURCE_GROUP: "rg-bot"
  BACKEND_APP_NAME: "app-be-meteora-dev"
  FRONTEND_APP_NAME: "app-meteora-dev-74eit"

jobs:
  # ────────────────────────────────────────────────────
  # BACKEND: FastAPI → Azure App Service (Linux, Oryx)
  # ────────────────────────────────────────────────────
  deploy-backend:
    name: "\U0001F40D Backend → Azure"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'backend' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "\U0001F510 Azure Login"
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "\U0001F4E6 Package backend"
        run: |
          cd backend
          zip -r ../backend-deploy.zip . \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".env" \
            -x ".env.*" \
            -x "skill-engine/node_modules/*" \
            -x "*.bak" \
            -x "*.bak2" \
            -x "*.zip"
          echo "✅ Backend zip created ($(du -h ../backend-deploy.zip | cut -f1))"

      - name: "\U0001F680 Deploy to App Service"
        run: |
          az webapp deploy \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src-path backend-deploy.zip \
            --type zip \
            --restart true \
            --timeout 600

      - name: "\U0001F3E5 Configure App Service"
        run: |
          # Ensure Oryx builds dependencies on deploy
          az webapp config appsettings set \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              WEBSITE_RUN_FROM_PACKAGE=0 \
            --output none

          # Set startup command
          az webapp config set \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --startup-file "startup.sh" \
            --output none

      - name: "❤️ Health Check"
        run: |
          echo "Waiting 90s for cold start..."
          sleep 90
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              https://${{ env.BACKEND_APP_NAME }}.azurewebsites.net/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            sleep 30
          done
          echo "⚠️ Backend not responding yet — may need more startup time on B1 plan"

  # ────────────────────────────────────────────────────
  # FRONTEND: React → Azure App Service (Node server)
  # ────────────────────────────────────────────────────
  deploy-frontend:
    name: "⚛️ Frontend → Azure"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "\U0001F7E2 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "\U0001F4E6 Install & Build"
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: "https://${{ env.BACKEND_APP_NAME }}.azurewebsites.net/api/v1"

      - name: "\U0001F5DC️ Package frontend"
        working-directory: frontend
        run: |
          # server.cjs serves dist/ — copy it inside dist for flat deployment
          cp server.cjs dist/server.cjs
          cd dist
          zip -r ../../frontend-deploy.zip .
          echo "✅ Frontend zip created ($(du -h ../../frontend-deploy.zip | cut -f1))"

      - name: "\U0001F510 Azure Login"
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "\U0001F680 Deploy to App Service"
        run: |
          az webapp deploy \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src-path frontend-deploy.zip \
            --type zip \
            --restart true \
            --timeout 300

      - name: "\U0001F3E5 Configure App Service"
        run: |
          az webapp config appsettings set \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              WEBSITE_RUN_FROM_PACKAGE=0 \
              WEBSITES_PORT=8080 \
            --output none

          az webapp config set \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --startup-file "node server.cjs" \
            --output none

      - name: "\U0001F310 Verify"
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://${{ env.FRONTEND_APP_NAME }}.azurewebsites.net/ || echo "000")
          echo "Frontend HTTP: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend is live!"
          else
            echo "⚠️ Frontend returned $STATUS"
          fi

  # ────────────────────────────────────────────────────
  # SUMMARY
  # ────────────────────────────────────────────────────
  summary:
    name: "\U0001F4CB Summary"
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Results
        run: |
          echo "═══════════════════════════════════════"
          echo "  HIBACore Deploy — Results"
          echo "═══════════════════════════════════════"
          echo "  Backend:  ${{ needs.deploy-backend.result }}"
          echo "  Frontend: ${{ needs.deploy-frontend.result }}"
          echo ""
          echo "  🐍 https://${{ env.BACKEND_APP_NAME }}.azurewebsites.net"
          echo "  ⚛️  https://${{ env.FRONTEND_APP_NAME }}.azurewebsites.net"
          echo "  📖 https://${{ env.BACKEND_APP_NAME }}.azurewebsites.net/docs"
          echo "═══════════════════════════════════════"
