# ────────────────────────────────────────────────────────────────
# HIBACore — Deploy to Azure (Manual Trigger)
# ────────────────────────────────────────────────────────────────
# Press "Run workflow" on GitHub Actions to deploy.
#
# Required GitHub Secrets (already configured):
#   AZURE_BACKEND_PUBLISH_PROFILE  – Backend App Service publish profile
#   AZURE_FRONTEND_PUBLISH_PROFILE – Frontend App Service publish profile
# ────────────────────────────────────────────────────────────────

name: "\U0001F680 Deploy to Azure"

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  BACKEND_APP_NAME: "app-be-meteora-dev"
  FRONTEND_APP_NAME: "app-meteora-dev-74eit"

jobs:
  # ────────────────────────────────────────────────────
  # BACKEND: FastAPI → Azure App Service (Linux, Oryx)
  # ────────────────────────────────────────────────────
  deploy-backend:
    name: "\U0001F40D Backend"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'backend' }}

    steps:
      - uses: actions/checkout@v4

      - name: "\U0001F4E6 Package backend"
        run: |
          cd backend
          zip -r ../backend-deploy.zip . \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".env" \
            -x ".env.*" \
            -x "skill-engine/node_modules/*" \
            -x "*.bak*" \
            -x "*.zip"
          echo "✅ $(du -h ../backend-deploy.zip | cut -f1)"

      - name: "\U0001F680 Deploy"
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend-deploy.zip

      - name: "❤️ Health Check"
        run: |
          sleep 90
          for i in 1 2 3 4; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              https://${{ env.BACKEND_APP_NAME }}.azurewebsites.net/health || echo "000")
            echo "Attempt $i → HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Backend healthy!" && exit 0
            sleep 30
          done
          echo "⚠️ Backend still starting (B1 cold start can take 2-5 min)"

  # ────────────────────────────────────────────────────
  # FRONTEND: React → Azure App Service (Node server)
  # ────────────────────────────────────────────────────
  deploy-frontend:
    name: "⚛️ Frontend"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "\U0001F4E6 Install & Build"
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: "https://${{ env.BACKEND_APP_NAME }}.azurewebsites.net/api/v1"

      - name: "\U0001F5DC️ Package"
        working-directory: frontend
        run: |
          cp server.cjs dist/server.cjs
          cd dist
          zip -r ../../frontend-deploy.zip .
          echo "✅ $(du -h ../../frontend-deploy.zip | cut -f1)"

      - name: "\U0001F680 Deploy"
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: frontend-deploy.zip

      - name: "\U0001F310 Verify"
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            https://${{ env.FRONTEND_APP_NAME }}.azurewebsites.net/ || echo "000")
          [ "$STATUS" = "200" ] && echo "✅ Frontend live!" || echo "⚠️ HTTP $STATUS"

  # ────────────────────────────────────────────────────
  summary:
    name: "\U0001F4CB Summary"
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - run: |
          echo "═══════════════════════════════════════"
          echo "  HIBACore Deploy Results"
          echo "═══════════════════════════════════════"
          echo "  Backend:  ${{ needs.deploy-backend.result }}"
          echo "  Frontend: ${{ needs.deploy-frontend.result }}"
          echo ""
          echo "  🐍 https://app-be-meteora-dev.azurewebsites.net"
          echo "  ⚛️  https://app-meteora-dev-74eit.azurewebsites.net"
          echo "  📖 https://app-be-meteora-dev.azurewebsites.net/docs"
          echo "═══════════════════════════════════════"
